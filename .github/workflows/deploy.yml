name: Demo CI

on:
  push:
    branches: [ "main" ]

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create file
        run: echo "hello world" > helloworld.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-file
          path: helloworld.txt

  inside_job:
    runs-on: ubuntu-latest
    needs: first-job
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: test-file

      - name: Show file
        run: cat helloworld.txt

  seconds-job:
    runs-on: ubuntu-latest
    needs: first-job
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: test-file

      - name: Grant permission
        run: chmod +x .github/workflows/test.sh

      - name: Run script
        run: ./.github/workflows/test.sh

      - name: Show artifact
        run: cat helloworld.txt